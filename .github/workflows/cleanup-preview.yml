# Clean up the preview environment when a site-related PR is closed,
# then trigger a production redeploy to restore the live site.
name: Cleanup Site Preview

on:
  pull_request:
    types: [closed]
    paths:
      - "site/**"

permissions:
  contents: read
  actions: write
  deployments: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete preview environment
        uses: actions/github-script@v7
        with:
          script: |
            const envName = `preview-pr-${context.payload.pull_request.number}`;
            core.info(`Cleaning up environment: ${envName}`);

            try {
              const { data: deployments } = await github.rest.repos.listDeployments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment: envName,
              });

              for (const deployment of deployments) {
                await github.rest.repos.createDeploymentStatus({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                  state: 'inactive',
                });
                await github.rest.repos.deleteDeployment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  deployment_id: deployment.id,
                });
              }

              await github.rest.repos.deleteAnEnvironment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                environment_name: envName,
              });

              core.info(`Environment ${envName} deleted`);
            } catch (error) {
              core.warning(`Cleanup for ${envName}: ${error.message}`);
            }

  redeploy-production:
    needs: cleanup
    runs-on: ubuntu-latest
    steps:
      - name: Trigger production deploy
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy-site.yml',
              ref: 'master',
            });
